name: storium
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  shared_preferences: ^2.5.5
  cloud_firestore: ^5.6.12
  http: ^1.6.0
  image_picker: ^1.1.2
  provider: ^6.1.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/stories/
    - assets/images/stories/grief/
    - assets/images/plants/
    - assets/images/plants/forget_me_not/
    - assets/images/plants/camellia/
    - assets/images/plants/rose/
    - assets/images/plants/iris/
    - assets/images/plants/ranunculus/
    - assets/data/
    - assets/collection_images/
    - assets/collection_images/animals/
    - assets/collection_images/space/
    - assets/collection_images/nature/
    - assets/collection_images/art/
    - assets/collection_images/ocean/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-Italic.ttf

    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
